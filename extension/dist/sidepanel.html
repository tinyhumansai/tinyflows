<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="ui.css"><title>TinyFlows workflows</title></head>
  <body class="panel">
    <header><span class="mark">TF</span><div><h1>TinyFlows</h1><p id="connection">Connecting…</p></div></header>
    <main>
      <section><div class="section-heading"><h2>Workflows</h2><button id="refresh" class="compact secondary">Refresh</button></div><div id="workflows" class="cards"><p class="muted">Loading workflows…</p></div></section>
      <section><div class="section-heading"><h2>Current run</h2><button id="cancel" class="compact danger" hidden>Cancel</button></div><div id="run"><p class="muted">No active run.</p></div></section>
      <section><h2>Event journal</h2><ol id="events" class="events"></ol></section>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
