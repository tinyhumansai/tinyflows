<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="ui.css"><title>TinyFlows</title></head>
  <body class="popup">
    <header><span class="mark">TF</span><div><h1>TinyFlows</h1><p id="relay-status">Checking companion…</p></div></header>
    <section>
      <h2>This tab</h2>
      <p id="tab-detail" class="muted">Checking sharing status…</p>
      <button id="toggle-tab" disabled>Share with TinyFlows</button>
      <p class="fine-print">Only tabs in the “TinyFlows shared tabs” group can be controlled. Removing a tab from the group revokes access.</p>
    </section>
    <section>
      <h2>Pair companion</h2>
      <label>Loopback relay<input id="relay-url" value="ws://127.0.0.1:32189/v1/extension" spellcheck="false"></label>
      <label>Pairing string<input id="pairing-token" type="password" autocomplete="off" spellcheck="false"></label>
      <button id="pair">Pair</button><p id="pair-result" role="status"></p>
    </section>
    <button id="open-panel" class="secondary">Open workflow panel</button>
    <script type="module" src="popup.js"></script>
  </body>
</html>
